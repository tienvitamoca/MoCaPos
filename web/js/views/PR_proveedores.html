<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitas de Proveedores - MOCA</title>
</head>

<body>
    <div class="cuadro-contenedor">

        <!-- ===================== -->
        <!-- 📋 LISTA PROVEEDORES -->
        <!-- ===================== -->
        <div data-bind="if: vistaInterna() === 'lista'">

            <!-- 🔍 BARRA DE BÚSQUEDA -->
            <div class="busqueda">
                <oj-select-one value="{{proveedorSeleccionado}}" options="[[proveedoresBusqueda]]"
                    placeholder="Buscar proveedor" maximum-result-count="0" minimum-results-for-search="0"
                    style="width: 100%;" on-value-changed="[[onProveedorSeleccionado]]">
                </oj-select-one>
            </div>

            <!-- 📅 VISTA POR DÍA -->
            <div data-bind="if: vistaActual() === 'porDia'">
                <oj-bind-for-each data="[[visitasSemanaOrdenada]]">
                    <template>
                        <div class="red-bloque-principal">

                            <div class="red-bloque-principal-header">
                                <div class="dia-titulo">
                                    <oj-bind-text value="[[$current.data.titulo]]"></oj-bind-text>
                                </div>
                            </div>

                            <div class="entregas-content">
                                <div class="red-contenedor-tarjetas">

                                    <oj-bind-for-each data="[[$current.data.proveedores]]">
                                        <template>
                                            <div class="red-tarjeta" on-click="[[() => openProveedor($current.data)]]">

                                                <img class="red-tarjeta-logo" data-bind="attr:{
                                                                                                src: $current.data.logo,
                                                                                                alt: $current.data.nombre
                                                                                                }">
                                                <div>
                                                    <oj-bind-for-each data="[[$current.data.montos]]">
                                                        <template>
                                                            <span class="oj-text-secondary-color">
                                                                $<oj-bind-text value="[[$current.data]]"></oj-bind-text>
                                                            </span>
                                                        </template>
                                                    </oj-bind-for-each>
                                                </div>

                                            </div>
                                        </template>
                                    </oj-bind-for-each>

                                </div>
                            </div>

                        </div>
                    </template>
                </oj-bind-for-each>
                <!-- ⏹️ PIE -->
                <div class="red-footer-centrado">
                    <button id="BtnTodosProveedores" class="btn-texto"
                        data-bind="click: function(){ vistaActual('todos') }">
                        TODOS LOS PROVEEDORES
                    </button>
                </div>
            </div>
            <!-- ===================== -->
            <!-- 📦 VISTA TODOS -->
            <!-- ===================== -->
            <div data-bind="if: vistaActual() === 'todos'">

                <!-- 🔙 BOTÓN REGRESAR -->
                <div class="acciones-superiores">
                    <oj-button on-oj-action="[[verPorDia]]" chroming="borderless">
                        ← Regresar a visitas por día
                    </oj-button>
                </div>

                <div class="red-contenedor-tarjetas">

                    <oj-bind-for-each data="[[todosLosProveedores]]">
                        <template>

                            <div class="red-tarjeta" on-click="[[() => openProveedor($current.data) ]]">

                                <img class="red-tarjeta-logo" data-bind="attr: { 
                     src: $current.data.logo, 
                     alt: $current.data.nombre 
                   }">

                                <div>
                                    <oj-bind-for-each data="[[$current.data.montos]]">
                                        <template>
                                            <span class="oj-text-secondary-color">
                                                $<oj-bind-text value="[[$current.data]]"></oj-bind-text>
                                            </span>
                                        </template>
                                    </oj-bind-for-each>
                                </div>

                            </div>

                        </template>
                    </oj-bind-for-each>

                </div>

            </div>



        </div>




        <!-- ===================== -->
        <!-- 🧩 MÓDULO HIJO -->
        <!-- ===================== -->
        <div data-bind="if: vistaInterna() === 'pedido'">
            <oj-module config="[[modPedidos]]"></oj-module>
        </div>

    </div>
</body>


</html>
