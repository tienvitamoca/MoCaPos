<!DOCTYPE html>
<html lang="es">

<body>
    <div>
        <!-- 🔎 BARRA DE BÚSQUEDA Y ACCIONES -->
        <div class="header-seccion">
            <div class="">
                <div class="oj-flex-item oj-sm-6 oj-md-4 logo-pedido">
                    <img src="css/images/logo.png" alt="Logo Bimbo">
                </div>
            </div>

            <form class="form-busqueda ">
                <label class="label-busqueda" for="search">
                    <oj-input-text class="inputBarraBusqueda" value="{{BarraBusqueda}}"
                        on-raw-value-changed="[[BarraBuscar]]" placeholder="Buscar">
                    </oj-input-text>
                    <div class="cont-busqueda"></div>
                    <div class="search">
                        <svg class="svg-icono" viewBox="0 0 24 24" aria-hidden="true"
                            class="r-14j79pv r-4qtqp9 r-yyyyoo r-1xvli5t r-dnmrzs r-4wgw6l r-f727ji r-bnwqim r-1plcrui r-lrvibr">
                            <g>
                                <path
                                    d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z">
                                </path>
                            </g>
                        </svg>
                    </div>
                </label>
            </form>

            <div class="css-ocultar-en-tablet" style="display: flex; justify-content: flex-end; gap: 8px;">
                <button class="icono-btn btn-camara" onclick="console.log('Cámara/Captura')">
                    📷
                </button>
                <button class="icono-btn btn-favoritos" onclick="console.log('Favoritos')">
                    ❤️
                </button>
                <button class="icono-btn btn-color-verde" onclick="console.log('Carrito/Venta rápida')">
                    🛒
                </button>
            </div>
        </div>


        <!-- 🔙 BOTÓN REGRESAR -->
        <div class="acciones-superiores">
            <oj-button on-oj-action="[[redirigirAProveedores]]" chroming="borderless">
                <span slot="startIcon">←</span> Regresar a proveedores
            </oj-button>
        </div>




        <!-- 🧾 Sección de faltantes -->
        <div class="contorno-cuadro" style="padding: 5px;">
            <div><strong>Faltantes:</strong></div>
            <div>
                <oj-bind-for-each data="[[faltantes]]">
                    <template>
                        <span class="faltante-producto" data-bind="css: { tachado: $current.data.agregado }">
                            <oj-bind-text value="[[$current.data.nombre]]"></oj-bind-text>
                        </span>
                        <span>, </span>
                    </template>
                </oj-bind-for-each>
            </div>
        </div>



        <!-- 📋 Tabla de productos -->
        <div class="contorno-cuadro ">
            <!-- //tabla 1-->
            <oj-table id="TablaProducto" class="tabla" aria-label="Productos" data="[[TblDatos]]"
                selection-mode='{"row":"single"}' columns-default='{"sortable": "enabled"}' columns="[[TblCols]]"
                style="width:100%;">

                <template slot="actionTemplate">
                    <oj-button class="icono-btn-redondo btn-color-verde"
                        on-oj-action="[[() => editarProducto(cell.item.data)]]">
                        <span slot="startIcon">🎁</span></oj-button>
                    </oj-button>

                    <oj-button class="icono-btn-redondo btn-color-azul"
                        on-oj-action="[[() => editarProducto(cell.item.data)]]">
                        <span slot="startIcon">✏️</span></oj-button>
                    </oj-button>

                    <oj-button class="icono-btn-redondo btn-color-rojo"
                        on-oj-action="[[() => eliminarProducto(cell.item.data)]]">
                        <span slot="startIcon">🗑️</span></oj-button>
                    </oj-button>

                </template>
            </oj-table>

            <oj-table id="TablaProductoMini" aria-label="Productos" data="[[TblDatos]]"
                selection-mode='{"row": "single", "column": "none"}' columns-default='{"sortable": "enabled"}'
                columns="[[TblColsMini]]" style="width:100%; font-size:13px;">
                <template slot="actionTemplate">
                    <span class="delete-icon">🗑️</span>
                </template>
            </oj-table>
        </div>


        <!-- 💰 Zona inferior -->
        <div>
            <div class="oj-flex oj-flex-items-pad oj-flex-wrap oj-sm-padding-2x oj-sm-align-items-center">

                <div class="oj-flex-item oj-sm-12 oj-md-3">
                    <label class="oj-text-secondary-color">N° de productos:</label>
                    <oj-bind-text id="LblNumProductos" value="[[CountNumProductos]]"></oj-bind-text>
                </div>

                <div class="oj-flex-item oj-sm-12 oj-md-3 oj-flex oj-sm-align-items-center">
                    <oj-button class="icono-btn-redondo btn-color-verde"
                        on-oj-action="[[() => editarProducto(cell.item.data)]]" style="margin-right: 8px;">
                        <span slot="startIcon">🎁</span>
                    </oj-button>

                    <div style="display: flex; gap: 4px; align-items: center;">
                        <span style="font-weight: bold;">PROMOCIÓN: </span>
                        <oj-bind-text value="[[PromoPorciento]]"></oj-bind-text>
                        <span>%</span> <span> <-> </span>
                        <span>$</span>
                        <oj-bind-text value="[[PromoCantidad]]"></oj-bind-text>
                    </div>
                </div>

                <div
                    class="oj-flex-item oj-sm-12 oj-md-3 css-ocultar-en-tablet oj-flex oj-sm-align-items-center oj-sm-justify-content-center">
                    <h2 id="LblCobroTotal"
                        style="font-size: 2em; color: #007bff; font-weight: bold; margin: 0; text-align: center;">
                        <oj-bind-text>Total: $</oj-bind-text>
                        <oj-bind-text value="[[CobroTotal]]"></oj-bind-text>
                    </h2>
                </div>
            </div>

            <div class="oj-flex oj-flex-items-pad oj-flex-wrap  oj-sm-align-items-center">
                <div class="oj-flex-item oj-sm-12 oj-md-3">
                </div>
                <div class="oj-flex-item oj-sm-12 oj-md-3">
                </div>
                <div class="oj-flex-item oj-sm-12 oj-md-6">
                    <oj-button class="btn-general btn-color-verde css-ocultar-en-tablet" on-oj-action="[[Btn_Pagar]]">
                        PAGAR
                    </oj-button>

                    <oj-button class="btn-general btn-color-rojo" on-oj-action="[[Btn_Impuestos]]">
                        Impuestos
                    </oj-button>

                    <oj-button class="btn-general btn-color-azul" on-oj-action="[[Btn_Impuestos]]">
                        Continuar después
                    </oj-button>

                </div>

            </div>

            <!-- SECCION DEBAJO MOVIL -->
            <div class="footer-movil"
                style=" align-items: center; justify-content: center; gap: 20px; padding: 15px; background: #f8f9fa; border-top: 1px solid #dee2e6; ">

                <div id="BtnContenedorTotal"
                    onclick="console.log('%c TOTAL COBRADO: ' + document.getElementById('LblCobroTotal').innerText)"
                    style="display: flex; justify-content: space-between; align-items: center; 
                background-color: #f8f9fa; border: 2px solid #007bff; border-radius: 50px; 
                padding: 10px 30px; width: 100%; max-width: 500px; 
                box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s;">

                    <div style="font-weight: bold;">
                        <h2 style="font-weight: bold; margin: 0; font-size: 1.5em; color: #333;">Pagar:</h2>
                    </div>

                    <div>
                        <h2 id="LblCobroTotal"
                            style="margin: 0; font-size: 2.2em; color: #007bff; font-weight: bold; text-align: right;">
                            <oj-bind-text value="[[CobroTotal]]"></oj-bind-text>
                        </h2>
                    </div>

                </div>
            </div>
        </div>
</body>

</html>
