<div class="pantalla-pruebas">

  <h2>Proveedor seleccionado</h2>

  <div class="proveedor-info">
    <p><strong>ID:</strong> <oj-bind-text value="[[proveedor.idProveedor]]"></oj-bind-text></p>
    <p><strong>Nombre:</strong> <oj-bind-text value="[[proveedor.nombre]]"></oj-bind-text></p>
  </div>

  <oj-button on-oj-action="[[cerrar]]">
    Regresar a proveedores
  </oj-button>

</div>
