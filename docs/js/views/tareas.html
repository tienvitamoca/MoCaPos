<div id="table" class="oj-sm-padding-4x">
  <h2>Tareas</h2>

  <!-- Botón para agregar tareas -->
  <oj-button class="oj-button-lg oj-button-success" on-oj-action="[[agregar]]">
    Agregar Tareas
  </oj-button>

  <!-- Tabla de tareas -->
  <oj-table
    id="tareasTable"
    data="[[dataProvider]]"
    columns="[[columns]]"
    selection-mode='{"row":"single"}'
    style="width: 100%; height: 500px;">
    
    <!-- Plantilla para la columna de acciones -->
    <template slot="actionTemplate" data-oj-as="cell">
      <oj-button class="demo-button-green" chroming="solid" on-oj-action="[[() => editar(cell.item.data)]]">
  <span slot="startIcon" class="oj-ux-ico-edit"></span>
  Editar
</oj-button>

<oj-button class="demo-button-red" chroming="solid" on-oj-action="[[() => eliminar(cell.item.data)]]">
  <span slot="startIcon" class="oj-ux-ico-delete-circle"></span>
  Eliminar
</oj-button>

    </template>
  </oj-table>
</div>
